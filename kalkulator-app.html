<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Haid</title>
    <link rel="stylesheet" crossorigin href="css/kalkulator-react.css">
    <style>
        body { margin: 0; padding: 0; }
        /* Hide authentication links */
        a[href="/login"], a[href="/register"], a[href="/forgot-password"], a[href="/reset-password"], a[href*="/api/apps/auth"] {
            display: none !important;
        }
    </style>
    <script>
        // Trick React Router into thinking we are at the root
        // so it renders the calendar (path: "/") instead of 404 (path: "*")
        window.history.replaceState(null, '', '/');
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" crossorigin src="js/kalkulator-react.js"></script>
</body>
</html>
